        const firebaseConfig = {

        function obtenerUbicacion() { ... }   // (mantengo igual)

        function renderMenu(categoria = 'all') { ... }   // igual

        function actualizarUI() { ... }   // igual

        async function cargarConfiguracionVisual() { ... }   // igual

        async function cargarProductosDesdeFirebase() { ... }   // igual

        // ==================== NUEVO CÓDIGO PARA INSTALAR PWA ====================
        // Detectar cuando se puede instalar la app
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-button').classList.remove('hidden');
        });

        // Acción al hacer clic en el botón "Instalar App"
        document.getElementById('install-button').addEventListener('click', async () => {
            if (!deferredPrompt) return;

            deferredPrompt.prompt();

            const { outcome } = await deferredPrompt.userChoice;
            
            if (outcome === 'accepted') {
                console.log('✅ Usuario instaló la app');
            } else {
                console.log('❌ Usuario canceló la instalación');
            }

            deferredPrompt = null;
            document.getElementById('install-button').classList.add('hidden');
        });

        // Ocultar botón si la app ya fue instalada
        window.addEventListener('appinstalled', () => {
            document.getElementById('install-button').classList.add('hidden');
        });

        // Registro del Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('✅ Service Worker registrado correctamente'))
                    .catch(err => console.log('❌ Error al registrar Service Worker:', err));
            });
        }

        window.onload = () => {
            cargarConfiguracionVisual();
            cargarProductosDesdeFirebase();
        };
    </script>
