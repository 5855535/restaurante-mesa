<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monster Burger | Domicilios</title>
  
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f9d423">
    <link id="dynamic-favicon" rel="icon" type="image/jpeg" href="logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
   
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0f0f0f;
            color: white;
            -webkit-tap-highlight-color: transparent;
        }
        .card-monster {
            background: #1a1a1a;
            border: 1px solid #262626;
            transition: transform 0.2s;
        }
        html, body { overflow-x: hidden; }
        .tab-active { background-color: #f9d423; color: black; }
        .tab-inactive { background-color: #1a1a1a; color: #a1a1aa; border: 1px solid #262626; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <!-- NAVBAR -->
    <nav class="bg-black/95 shadow-xl sticky top-0 z-50 border-b border-yellow-500/20 backdrop-blur-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <img id="dynamic-logo" src="logo.jpg" alt="Logo" class="w-10 h-10 rounded-full border border-yellow-500 object-cover">
                <h1 class="text-lg sm:text-2xl font-black italic tracking-tighter">
                    MONSTER<span class="text-red-600">BURGER</span>
                </h1>
            </div>
           
            <div class="flex items-center gap-3">
                <button onclick="triggerInstall()" class="flex items-center gap-2 bg-yellow-500 hover:bg-yellow-400 text-black px-5 py-3 rounded-2xl font-bold text-sm active:scale-95 transition-all shadow-lg">
                    <i class="fas fa-download"></i>
                    <span class="hidden sm:inline">Instalar App</span>
                </button>
                <button onclick="toggleCart()" class="flex items-center gap-2 bg-white text-black px-4 py-3 rounded-2xl font-bold transition-all relative">
                    <i class="fas fa-shopping-basket text-lg"></i>
                    <span class="hidden xs:inline text-sm">MI ORDEN</span>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-red-600 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center border border-black font-bold">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <div class="relative py-12 sm:py-20 overflow-hidden bg-black flex items-center justify-center border-b border-white/5">
        <div class="absolute inset-0 opacity-20">
            <div class="absolute top-0 left-0 w-48 h-48 bg-red-600 rounded-full filter blur-[80px]"></div>
            <div class="absolute bottom-0 right-0 w-48 h-48 bg-yellow-500 rounded-full filter blur-[80px]"></div>
        </div>
        <div class="relative max-w-7xl mx-auto px-6 text-center">
            <h2 class="text-monster-hero text-4xl sm:text-7xl font-black mb-4 italic tracking-tighter uppercase">
                CALMA TU <span class="text-yellow-500">HAMBRE</span> <br class="sm:hidden"> DE <span class="text-red-600">BESTIA</span>
            </h2>
        </div>
    </div>

    <!-- Tabs (sin Todo ni Bebidas) -->
    <div class="sticky top-[60px] z-40 bg-[#0f0f0f] border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4 py-4 overflow-x-auto hide-scrollbar">
            <div class="flex gap-3 whitespace-nowrap" id="tabs-container">
                <button onclick="filtrarCategoria('hamburguesas')" class="tab-active px-6 py-3 rounded-2xl font-bold shadow text-sm uppercase">Hamburguesas</button>
                <button onclick="filtrarCategoria('perros')" class="tab-inactive px-6 py-3 rounded-2xl font-bold shadow text-sm uppercase">Perros Calientes</button>
                <button onclick="filtrarCategoria('salchipapas')" class="tab-inactive px-6 py-3 rounded-2xl font-bold shadow text-sm uppercase">Salchipapas</button>
                <button onclick="filtrarCategoria('especiales')" class="tab-inactive px-6 py-3 rounded-2xl font-bold shadow text-sm uppercase">Especiales</button>
                <button onclick="filtrarCategoria('sandwich')" class="tab-inactive px-6 py-3 rounded-2xl font-bold shadow text-sm uppercase">Sándwich</button>
                <button onclick="filtrarCategoria('pollo')" class="tab-inactive px-6 py-3 rounded-2xl font-bold shadow text-sm uppercase">Pollo Broaster</button>
                <button onclick="filtrarCategoria('patacon')" class="tab-inactive px-6 py-3 rounded-2xl font-bold shadow text-sm uppercase">Patacón</button>
                <button onclick="filtrarCategoria('adiciones')" class="tab-inactive px-6 py-3 rounded-2xl font-bold shadow text-sm uppercase">Adiciones</button>
                <button onclick="filtrarCategoria('entradas')" class="tab-inactive px-6 py-3 rounded-2xl font-bold shadow text-sm uppercase">Entradas</button>
            </div>
        </div>
    </div>

    <div id="menu-section" class="max-w-7xl mx-auto px-4 sm:px-6 py-12">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="menu-grid"></div>
    </div>

    <!-- MODAL DEL CARRITO -->
    <div id="cart-modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md z-[100] flex items-end sm:items-center justify-center">
        <div class="bg-zinc-900 w-full sm:max-w-lg h-[90vh] sm:h-auto sm:rounded-3xl overflow-hidden flex flex-col border-t sm:border border-gray-800 shadow-2xl">
            <div class="bg-red-600 text-white px-6 py-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <i class="fas fa-ghost text-xl"></i>
                    <h3 class="text-xl font-black italic uppercase">Tu Lista de Caza</h3>
                </div>
                <button onclick="toggleCart()" class="text-3xl p-2">&times;</button>
            </div>

            <div id="cart-items" class="flex-1 p-6 overflow-y-auto space-y-4"></div>

            <!-- SALSAS -->
            <div class="border-t border-gray-700 bg-black/60">
                <button onclick="toggleSalsas()" class="w-full px-6 py-5 flex items-center justify-between hover:bg-zinc-800 transition-colors">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-drumstick-bite text-yellow-500"></i>
                        <span class="font-bold text-lg">Salsas</span>
                    </div>
                    <i id="salsas-icon" class="fas fa-chevron-down text-xl transition-transform"></i>
                </button>
                <div id="salsas-content" class="hidden px-6 pb-6">
                    <p class="text-gray-400 text-sm mb-4">Máximo 3 de cada salsa</p>
                    <div id="salsas-container" class="space-y-4"></div>
                </div>
            </div>

            <!-- BEBIDAS -->
            <div class="border-t border-gray-700 bg-black/60">
                <button onclick="toggleBebidas()" class="w-full px-6 py-5 flex items-center justify-between hover:bg-zinc-800 transition-colors">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-glass-water text-yellow-500"></i>
                        <span class="font-bold text-lg">Bebidas</span>
                    </div>
                    <i id="bebidas-icon" class="fas fa-chevron-down text-xl transition-transform"></i>
                </button>
                <div id="bebidas-content" class="hidden px-6 pb-6">
                    <p class="text-gray-400 text-sm mb-4">Elige tus bebidas</p>
                    <div id="bebidas-container" class="space-y-4"></div>
                </div>
            </div>

            <div class="p-6 border-t border-gray-800 bg-black/60">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-gray-400 font-bold uppercase text-xs tracking-widest">Total</span>
                    <span id="cart-total" class="font-black text-3xl text-yellow-500">$0</span>
                </div>
                <button onclick="enviarOrdenWhatsApp()" class="w-full bg-green-500 active:scale-95 text-black py-4 rounded-2xl text-lg font-black flex items-center justify-center gap-3 shadow-lg">
                    <i class="fab fa-whatsapp text-2xl"></i> PEDIR POR WHATSAPP
                </button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBOlbYHJdAb1tcEHW-_vT2b8-CnZdYTdtI",
            authDomain: "monster-burger-aac9b.firebaseapp.com",
            projectId: "monster-burger-aac9b",
            storageBucket: "monster-burger-aac9b.firebasestorage.app",
            messagingSenderId: "766220466657",
            appId: "1:766220466657:web:c8c60c05b2ab40cc11faa0",
            measurementId: "G-X62MK80WG1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const telefonoWhatsApp = "573203707804";

        let ubicacionUsuario = "Obteniendo ubicación...";   // ← Cambiado
        let productos = [];
        let carrito = [];
        
        // Salsas
        let salsasSeleccionadas = { rosada: 0, roja: 0, mayonesa: 0, picante: 0 };
        const salsasNombres = { rosada: "Salsa Rosada", roja: "Salsa Roja", mayonesa: "Mayonesa", picante: "Picante" };

        // Bebidas
        let bebidasData = [];
        let bebidasSeleccionadas = {};

        let salsasAbiertas = false;
        let bebidasAbiertas = false;

        // ==================== SOLICITAR UBICACIÓN AL ENTRAR ====================
        function solicitarUbicacionInicial() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const lat = pos.coords.latitude;
                        const lon = pos.coords.longitude;
                        ubicacionUsuario = `https://www.google.com/maps?q=${lat},${lon}`;
                        console.log("✅ Ubicación cargada correctamente al inicio");
                    },
                    (error) => {
                        console.warn("⚠️ Usuario denegó la ubicación o error:", error);
                        ubicacionUsuario = "Ubicación no compartida (por favor activa GPS)";
                    }
                );
            } else {
                ubicacionUsuario = "Tu navegador no soporta geolocalización";
            }
        }

        // ==================== CARGAR BEBIDAS ====================
        async function cargarBebidas() {
            try {
                const snapshot = await db.collection('bebidas').get();
                bebidasData = [];
                bebidasSeleccionadas = {};

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const bebidaId = doc.id;
                    bebidasData.push({
                        id: bebidaId,
                        nombre: data.nombre || "Bebida",
                        precio: data.precio || 0
                    });
                    bebidasSeleccionadas[bebidaId] = 0;
                });
            } catch (error) {
                console.error("Error cargando bebidas:", error);
            }
        }

        // ==================== SALSAS ====================
        function toggleSalsas() {
            salsasAbiertas = !salsasAbiertas;
            document.getElementById('salsas-content').classList.toggle('hidden');
            document.getElementById('salsas-icon').classList.toggle('rotate-180');
            if (salsasAbiertas) renderSalsas();
        }

        function renderSalsas() {
            const container = document.getElementById('salsas-container');
            let html = '';
            Object.keys(salsasNombres).forEach(key => {
                const cantidad = salsasSeleccionadas[key];
                html += `
                    <div class="flex items-center justify-between bg-zinc-800 p-4 rounded-2xl">
                        <span class="font-medium">${salsasNombres[key]}</span>
                        <div class="flex items-center gap-4">
                            <button onclick="cambiarSalsa('${key}', -1)" class="w-8 h-8 bg-zinc-700 hover:bg-red-600 rounded-xl flex items-center justify-center text-xl font-bold">-</button>
                            <span class="font-bold text-xl w-8 text-center">${cantidad}</span>
                            <button onclick="cambiarSalsa('${key}', 1)" class="w-8 h-8 bg-zinc-700 hover:bg-green-600 rounded-xl flex items-center justify-center text-xl font-bold">+</button>
                        </div>
                    </div>`;
            });
            container.innerHTML = html;
        }

        function cambiarSalsa(tipo, delta) {
            const nueva = salsasSeleccionadas[tipo] + delta;
            if (nueva < 0 || nueva > 3) return;
            salsasSeleccionadas[tipo] = nueva;
            renderSalsas();
            actualizarUI();
        }

        // ==================== BEBIDAS ====================
        function toggleBebidas() {
            bebidasAbiertas = !bebidasAbiertas;
            document.getElementById('bebidas-content').classList.toggle('hidden');
            document.getElementById('bebidas-icon').classList.toggle('rotate-180');
            if (bebidasAbiertas) renderBebidas();
        }

        function renderBebidas() {
            const container = document.getElementById('bebidas-container');
            let html = '';
            bebidasData.forEach(bebida => {
                const cantidad = bebidasSeleccionadas[bebida.id] || 0;
                html += `
                    <div class="flex items-center justify-between bg-zinc-800 p-4 rounded-2xl">
                        <span class="font-medium">${bebida.nombre}</span>
                        <div class="flex items-center gap-4">
                            <button onclick="cambiarBebida('${bebida.id}', -1)" class="w-8 h-8 bg-zinc-700 hover:bg-red-600 rounded-xl flex items-center justify-center text-xl font-bold">-</button>
                            <span class="font-bold text-xl w-8 text-center">${cantidad}</span>
                            <button onclick="cambiarBebida('${bebida.id}', 1)" class="w-8 h-8 bg-zinc-700 hover:bg-green-600 rounded-xl flex items-center justify-center text-xl font-bold">+</button>
                        </div>
                    </div>`;
            });
            container.innerHTML = html || '<p class="text-gray-500 text-center py-4">No hay bebidas disponibles</p>';
        }

        function cambiarBebida(id, delta) {
            const nueva = (bebidasSeleccionadas[id] || 0) + delta;
            if (nueva < 0) return;
            if (nueva > 5) {
                alert("⚠️ Solo puedes pedir máximo 5 de cada bebida");
                return;
            }
            bebidasSeleccionadas[id] = nueva;
            renderBebidas();
            actualizarUI();
        }

        // ==================== CALCULAR TOTAL ====================
        function calcularTotal() {
            let total = 0;
            carrito.forEach(item => total += (item.precio || 0) * item.cantidad);

            bebidasData.forEach(bebida => {
                total += (bebida.precio || 0) * (bebidasSeleccionadas[bebida.id] || 0);
            });

            const totalSalsas = Object.values(salsasSeleccionadas).reduce((a, b) => a + b, 0);
            total += Math.floor(totalSalsas / 2) * 1000;

            return total;
        }

        function actualizarUI() {
            document.getElementById('cart-count').textContent = carrito.reduce((s, i) => s + i.cantidad, 0);
            renderCarrito();
            document.getElementById('cart-total').textContent = '$' + calcularTotal().toLocaleString();
        }

        function enviarOrdenWhatsApp() {
            if (carrito.length === 0) return;

            let msg = `👹 *PEDIDO MONSTER BURGER*\n\n`;
            carrito.forEach(i => msg += `✅ *${i.cantidad}x* ${i.nombre}\n`);

            let salsasTexto = '';
            Object.keys(salsasSeleccionadas).forEach(key => {
                if (salsasSeleccionadas[key] > 0) salsasTexto += `${salsasSeleccionadas[key]}x ${salsasNombres[key]}\n`;
            });
            if (salsasTexto) msg += `\n🥫 *SALSAS:*\n${salsasTexto}`;

            let bebidasTexto = '';
            bebidasData.forEach(bebida => {
                const cant = bebidasSeleccionadas[bebida.id] || 0;
                if (cant > 0) {
                    const subtotal = bebida.precio * cant;
                    bebidasTexto += `${cant}x ${bebida.nombre} ($${subtotal.toLocaleString()})\n`;
                }
            });
            if (bebidasTexto) msg += `\n🥤 *BEBIDAS:*\n${bebidasTexto}`;

            const totalSalsas = Object.values(salsasSeleccionadas).reduce((a, b) => a + b, 0);
            const cargoSalsas = Math.floor(totalSalsas / 2) * 1000;
            if (cargoSalsas > 0) msg += `\n🍅 *CARGO EXTRA POR SALSAS:* $${cargoSalsas.toLocaleString()}\n`;

            msg += `\n💰 *TOTAL FINAL: $${calcularTotal().toLocaleString()}*`;
            msg += `\n\n📍 *UBICACIÓN:* ${ubicacionUsuario}`;

            window.open(`https://wa.me/${telefonoWhatsApp}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            modal.classList.toggle('hidden');
            document.body.style.overflow = modal.classList.contains('hidden') ? 'auto' : 'hidden';
            if (!modal.classList.contains('hidden')) {
                renderCarrito();
            }
        }

        // ==================== Tus funciones restantes ====================
        function renderMenu(categoria = 'hamburguesas') {
            const grid = document.getElementById('menu-grid');
            const filtrados = productos.filter(p => p.categoria === categoria);
          
            grid.innerHTML = filtrados.map(p => `
                <div class="card-monster rounded-2xl overflow-hidden shadow-lg">
                    <img src="${p.img}" class="w-full h-48 object-cover" onerror="this.src='logo.jpg'">
                    <div class="p-5">
                        <h3 class="font-black text-lg uppercase italic text-yellow-500 mb-1">${p.nombre}</h3>
                        <p class="text-gray-400 text-xs mb-4 line-clamp-2">${p.desc}</p>
                        <div class="flex items-center justify-between">
                            <span class="text-xl font-black text-white">$${p.precio.toLocaleString()}</span>
                            <button onclick="agregarAlCarrito('${p.id}')" class="bg-white text-black active:bg-yellow-500 px-4 py-2 rounded-xl font-bold text-xs uppercase">Agregar</button>
                        </div>
                    </div>
                </div>
            `).join('');

            if (filtrados.length === 0) {
                grid.innerHTML = '<p class="col-span-full text-center py-10 text-gray-500 italic">No hay productos en esta categoría aún...</p>';
            }
        }

        function filtrarCategoria(cat) {
            const botones = document.querySelectorAll('#tabs-container button');
            botones.forEach(btn => {
                btn.className = btn.getAttribute('onclick').includes(`'${cat}'`) 
                    ? "tab-active px-6 py-3 rounded-2xl font-bold shadow text-sm uppercase transition-all" 
                    : "tab-inactive px-6 py-3 rounded-2xl font-bold shadow text-sm uppercase transition-all";
            });
            renderMenu(cat);
        }

        function agregarAlCarrito(id) {
            const prod = productos.find(p => p.id === id);
            if (!prod) return;
            const item = carrito.find(i => i.id === id);
            item ? item.cantidad++ : carrito.push({ ...prod, cantidad: 1 });
            actualizarUI();
            mostrarNotificacion(`¡${prod.nombre} añadida!`);
        }

        function renderCarrito() {
            const container = document.getElementById('cart-items');
            if (carrito.length === 0) {
                container.innerHTML = `<div class="text-center py-10"><p class="text-gray-500">Carrito vacío</p></div>`;
                return;
            }
            container.innerHTML = carrito.map((item, index) => `
                <div class="flex items-center gap-4 bg-white/5 p-3 rounded-2xl border border-white/5">
                    <img src="${item.img}" class="w-16 h-16 object-cover rounded-xl" onerror="this.src='logo.jpg'">
                    <div class="flex-1">
                        <h4 class="font-bold text-sm uppercase">${item.nombre}</h4>
                        <p class="text-yellow-500 font-bold">$${item.precio.toLocaleString()}</p>
                        <div class="flex items-center gap-4 mt-2">
                            <button onclick="cambiarCantidad(${index}, -1)" class="text-red-500"><i class="fas fa-minus-circle"></i></button>
                            <span class="font-bold">${item.cantidad}</span>
                            <button onclick="cambiarCantidad(${index}, 1)" class="text-green-500"><i class="fas fa-plus-circle"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function cambiarCantidad(i, c) {
            carrito[i].cantidad += c;
            if (carrito[i].cantidad < 1) carrito.splice(i, 1);
            actualizarUI();
        }

        function mostrarNotificacion(t) {
            const n = document.createElement('div');
            n.className = 'fixed top-4 left-1/2 -translate-x-1/2 bg-yellow-500 text-black px-6 py-2 rounded-full font-black z-[300] shadow-2xl text-xs uppercase italic';
            n.innerHTML = t;
            document.body.appendChild(n);
            setTimeout(() => { n.style.opacity = '0'; setTimeout(() => n.remove(), 500); }, 1500);
        }

        async function cargarConfiguracionVisual() {
            try {
                const doc = await db.collection('configuracion').doc('apariencia').get();
                if (doc.exists) {
                    const data = doc.data();
                    if (data.logoUrl) document.getElementById('dynamic-logo').src = data.logoUrl;
                    if (data.faviconUrl) document.getElementById('dynamic-favicon').href = data.faviconUrl;
                }
            } catch (error) {
                console.error("Error cargando configuración visual:", error);
            }
        }

        async function cargarProductosDesdeFirebase() {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = '<p class="col-span-full text-center py-10 text-yellow-500 animate-pulse font-black italic">CAZANDO COMIDA EN LA NUBE...</p>';
            try {
                const snapshot = await db.collection('productos').get();
                productos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderMenu('hamburguesas');
            } catch (error) {
                console.error("Error al traer productos:", error);
                grid.innerHTML = '<p class="col-span-full text-center py-10 text-red-600 font-bold">ERROR DE CONEXIÓN.</p>';
            }
        }

        // Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(() => console.log('Service Worker registrado'))
                    .catch(err => console.log('Error Service Worker:', err));
            });
        }

        // ==================== INICIO DE LA APP ====================
        window.onload = () => {
            cargarConfiguracionVisual();
            cargarProductosDesdeFirebase();
            cargarBebidas();
            solicitarUbicacionInicial();     // ← Nueva función: pide ubicación al entrar
        };
    </script>
</body>
</html>
